name: Automated Task Collector

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  discussions: write
  issues: read
  contents: read

jobs:
  collect-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "REPORT_TITLE=Hourly Report - $(date +'%Y-%m-%d %H:00')" >> $GITHUB_ENV
          
          echo "## 📊 Task Progress Summary" > report.md
          echo "Generated at: \`$(date)\`" >> report.md
          echo "" >> report.md
          
          echo "### ✅ Recently Completed" >> report.md
          # 获取最近 1 小时关闭的带有 task/done 标签的任务
          gh issue list --label "task/done" --state closed --limit 10 --json title,url,assignees --template '{{range .}}- [{{.title}}]({{.url}}) (Owner: {{range .assignees}}{{.login}}{{end}}){{"\n"}}{{else}}No tasks completed this hour.{{end}}' >> report.md
          
          echo "" >> report.md
          echo "### ⏳ In Progress" >> report.md
          gh issue list --label "task/processing" --state open --limit 10 --json title,url,assignees --template '{{range .}}- [{{.title}}]({{.url}}) (Working: {{range .assignees}}{{.login}}{{end}}){{"\n"}}{{else}}No tasks currently in progress.{{end}}' >> report.md
          
          # 将 report.md 内容读入变量，处理换行符以防 shell 注入
          REPORT_BODY=$(cat report.md)
          echo "REPORT_BODY<<EOF" >> $GITHUB_ENV
          echo "$REPORT_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ ! -z "$TELEGRAM_BOT_TOKEN" ]; then
            # Convert markdown to HTML or simplified text for TG
            MSG="📊 *Hourly Task Report*\n$(date +'%Y-%m-%d %H:00')\n\n$(cat report.md | sed 's/#//g' | sed 's/\*\*/\*/g')"
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=$MSG" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true"
          fi
